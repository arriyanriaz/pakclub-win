<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAKclub Official Gaming Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #22140c;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
        }
        .container {
            max-width: 450px;
            margin: auto;
            background: #2c1a10;
            min-height: 100vh;
            padding: 12px;
            box-sizing: border-box;
            position: relative;
        }

        /* LOGIN SIGNUP SCREEN SYSTEM */
        .auth-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #22140c;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-card {
            background: #2c1a10;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            border: 1px solid #eb7d1e;
        }
        .auth-logo {
            font-size: 20px;
            font-weight: bold;
            color: #eb7d1e;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .auth-title {
            font-size: 26px;
            font-weight: bold;
            color: #eb7d1e;
            margin-bottom: 5px;
        }
        .auth-subtitle {
            font-size: 13px;
            color: #bfa598;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #4a2a1f;
            background: #110905;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        .input-group input:focus {
            border-color: #eb7d1e;
            outline: none;
        }

        /* Top Balance Card */
        .wallet-card {
            background: linear-gradient(135deg, #42201d, #361f14);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: center;
            border: 1px solid #4a2a1f;
        }
        .wallet-title { font-size: 26px; font-weight: bold; color: #ffffff; }
        .wallet-sub { font-size: 12px; color: #bfa598; margin-top: 4px; }

        /* Game Modes Switches Grid */
        .mode-grid {
            display: flex;
            justify-content: space-between;
            background: #22140c;
            border-radius: 12px;
            padding: 5px;
            gap: 5px;
            margin-bottom: 12px;
        }
        .mode-item {
            flex: 1;
            background: transparent;
            padding: 8px 2px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: none;
            color: #bfa598;
            font-size: 12px;
            font-weight: bold;
        }
        .mode-item.active {
            background: #eb7d1e;
            color: white;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            flex: 1;
            width: 100%;
        }
        .btn-green { background: #eb7d1e; }
        .auth-footer {
            margin-top: 20px;
            font-size: 13px;
            color: #bfa598;
        }
        .auth-footer span {
            color: #eb7d1e;
            cursor: pointer;
        }

        /* Profile & Layout Utilities */
        .profile-sec {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #eb7d1e; }
        .u-info { text-align: left; }
        .u-name { font-weight: bold; font-size: 15px; }
        .u-bal { font-size: 16px; color: #eb7d1e; font-weight: bold; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">PAKclub</div>
            <div class="auth-title">PAKclub Win</div>
            <div class="auth-subtitle">Secure Access Verification Portal</div>
            
            <div class="input-group">
                <input type="text" placeholder="Mobile Number / Player ID">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password">
            </div>
            
            <button type="button" class="btn-green" onclick="handleLogin()">Log In</button>
            
            <div class="auth-footer">Don't have an account? <span>Register Now</span></div>
        </div>
    </div>

    <div class="container">
        <div class="profile-sec">
            <div class="user-meta">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" class="avatar" alt="User">
                <div class="u-info">
                    <div class="u-name">ArriyanRiaz</div>
                    <div class="u-bal">Rs.0.45</div>
                </div>
            </div>
        </div>

        <div class="wallet-card">
            <div class="wallet-title">Rs.0.45</div>
            <div class="wallet-sub">Wallet Balance</div>
        </div>

        <div class="mode-grid">
            <button class="mode-item active">WinGo 30sec</button>
            <button class="mode-item">WinGo 1 Min</button>
            <button class="mode-item">WinGo 3 Min</button>
            <button class="mode-item">WinGo 5 Min</button>
        </div>
        
        <p style="color: #bfa598; font-size: 14px; margin-top: 40px;">Dashboard Loaded Successfully.</p>
    </div>

    <script>
    function handleLogin() {
        var authScreen = document.querySelector('.auth-screen');
        if (authScreen) {
            authScreen.style.style.transition = "opacity 0.3s ease";
            authScreen.style.opacity = "0";
            setTimeout(function() {
                authScreen.style.display = 'none';
            }, 300);
        }
    }
    </script>

</body>
</html>
