<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAKclub Official Gaming Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #22140c;
            color: white;
            text-align: center;
            margin: 0; padding: 0; padding-bottom: 70px;
        }
        .container {
            max-width: 450px; margin: auto; background: #2c1a10;
            min-height: 100vh; padding: 12px; box-sizing: border-box;
        }
        /* LOGIN OVERLAY */
        .auth-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #22140c; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .auth-card {
            background: #2c1a10; width: 100%; max-width: 380px;
            padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.7); border: 1px solid #eb7d1e;
        }
        .auth-logo { font-size: 28px; font-weight: bold; color: #eb7d1e; margin-bottom: 5px; }
        .wallet-card {
            background: linear-gradient(135deg, #42291d, #361f14);
            border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #4a2e1f;
        }
        .wallet-title { font-size: 26px; font-weight: bold; color: #ffffff; }
        .mode-grid { display: flex; justify-content: space-between; background: #22140c; border-radius: 12px; padding: 5px; gap: 5px; margin-bottom: 12px; }
        .mode-item { flex: 1; background: transparent; padding: 8px 2px; border-radius: 10px; color: #bfa598; font-size: 11px; border: none; }
        .mode-item.active { background: linear-gradient(180deg, #ff8c1a, #e67300); color: white; font-weight: bold; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px;
            border: 1px solid #4a2e1f; background: #22140c; color: white; box-sizing: border-box;
        }
        .btn-submit {
            background: linear-gradient(180deg, #ff8c1a, #e67300);
            color: white; width: 100%; padding: 12px; border: none;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="auth-screen" id="login-panel">
        <div class="auth-card">
            <div class="auth-logo">PAKclub Win</div>
            <p style="color:#bfa598; font-size:12px; margin-bottom:20px;">Secure Access Verification Portal</p>
            <input type="text" placeholder="Mobile Number / Player ID" value="03451234567">
            <input type="password" placeholder="Password" value="123456">
            <button class="btn-submit" onclick="khloDashboard()">Log In</button>
        </div>
    </div>

    <div class="container">
        <div class="wallet-card">
            <div class="wallet-title">Rs.9500.00</div>
            <p style="font-size: 12px; color: #bfa598;">Available Trading Balance</p>
        </div>

        <div class="mode-grid">
            <button class="mode-item active">⏱️<br>WinGo 30s</button>
            <button class="mode-item">⏱️<br>WinGo 1m</button>
            <button class="mode-item">⏱️<br>WinGo 3m</button>
        </div>
        
        <p style="color:#ff8c1a; font-weight:bold; margin-top:50px;">🎉 Welcome to Dashboard! Game is Active.</p>
    </div>

    <script>
        function khloDashboard() {
            var screen = document.getElementById('login-panel');
            if(screen) {
                screen.style.display = 'none';
            }
        }
    </script>
</body>
</html>
