<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAKclub Official WinGo Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #22140c;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 450px;
            margin: auto;
            background: #2c1a10;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        /* Top Balance Card */
        .wallet-card {
            background: linear-gradient(135deg, #42291d, #361f14);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: center;
        }
        .wallet-title {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
        }
        .wallet-sub {
            font-size: 12px;
            color: #bfa598;
            margin-top: 4px;
        }
        .action-btns {
            display: flex;
            justify-content: space-around;
            margin-top: 12px;
            gap: 10px;
        }
        .act-btn {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            font-weight: bold;
            border: none;
            color: white;
            font-size: 15px;
        }
        .btn-withdraw { background-color: #f05353; }
        .btn-deposit { background-color: #26a96e; }

        /* Game Modes Grid */
        .mode-grid {
            display: flex;
            justify-content: space-between;
            background: #22140c;
            border-radius: 12px;
            padding: 5px;
            gap: 5px;
            margin-bottom: 12px;
        }
        .mode-item {
            flex: 1;
            background: transparent;
            padding: 8px 4px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: none;
            color: #bfa598;
            font-size: 11px;
        }
        .mode-item.active {
            background: linear-gradient(180deg, #ff8c1a, #e67300);
            color: white;
            font-weight: bold;
        }
        .mode-item img {
            width: 20px;
            height: 20px;
            display: block;
            margin: 0 auto 4px auto;
            opacity: 0.7;
        }
        .mode-item.active img { opacity: 1; }

        /* Time & Period Banner */
        .time-banner {
            background: linear-gradient(90deg, #e67300, #361f14);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .period-info { text-align: left; font-size: 12px; }
        .countdown-box { text-align: right; }
        .timer-display {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
            margin-top: 2px;
        }

        /* Color Selection Bar */
        .color-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 12px;
        }
        .color-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 15px;
        }
        .bg-green { background-color: #26a96e; }
        .bg-violet { background-color: #9253f0; }
        .bg-red { background-color: #f05353; }

        /* Numbers Grid */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: #22140c;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .num-ball {
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }
        /* Mixed Colors for special numbers */
        .ball-red { background: #f05353; }
        .ball-green { background: #26a96e; }
        .ball-violet-red { background: linear-gradient(135deg, #9253f0 50%, #f05353 50%); }
        .ball-violet-green { background: linear-gradient(135deg, #9253f0 50%, #26a96e 50%); }

        /* Size Selection Bar */
        .size-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }
        .size-btn {
            flex: 1;
            padding: 12px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            color: white;
            border-radius: 20px;
        }
        .btn-big { background: #ff9800; }
        .btn-small { background: #2196f3; }

        /* Navigation Tabs Control */
        .tab-bar {
            display: flex;
            justify-content: space-around;
            background: #22140c;
            border-radius: 10px 10px 0 0;
            margin-top: 15px;
        }
        .tab-item {
            flex: 1;
            padding: 12px;
            color: #bfa598;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-item.active {
            color: #ff8c1a;
            border-bottom: 3px solid #ff8c1a;
            background: rgba(255,140,26,0.05);
        }

        /* Tab Content Presentation */
        .tab-content {
            background: #22140c;
            padding: 10px;
            border-radius: 0 0 10px 10px;
            min-height: 150px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        th {
            background-color: #eb7d1e;
            color: white;
            padding: 8px;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #361f14;
        }
        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Forms Elements */
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border: 1px solid #4a2e1f;
            background: #22140c;
            color: white;
            box-sizing: border-box;
        }
        .gateway-card {
            background: #361f14;
            padding: 12px;
            border-radius: 10px;
            text-align: left;
            margin-top: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="wallet-card">
        <div class="wallet-title">Rs.<span id="main-balance">5000.00</span></div>
        <div class="wallet-sub">💳 Wallet balance</div>
        <div class="action-btns">
            <button class="act-btn btn-withdraw" onclick="alert('Use Direct Auto Gateway below for Instant Action!')">Withdraw</button>
            <button class="act-btn btn-deposit" onclick="alert('Use Direct Auto Gateway below for Instant Action!')">Deposit</button>
        </div>
    </div>

    <div class="mode-grid">
        <button class="mode-item active" id="mode-30s" onclick="switchGameMode(30)">⏱️<br>WinGo 30sec</button>
        <button class="mode-item" id="mode-1m" onclick="switchGameMode(60)">⏱️<br>WinGo 1 Min</button>
        <button class="mode-item" id="mode-3m" onclick="switchGameMode(180)">⏱️<br>WinGo 3 Min</button>
        <button class="mode-item" id="mode-5m" onclick="switchGameMode(300)">⏱️<br>WinGo 5 Min</button>
    </div>

    <div class="time-banner">
        <div class="period-info">
            <span style="color:#bfa598;">Period Number</span><br>
            <strong id="display-period" style="font-size:14px;">20260613100051</strong>
        </div>
        <div class="countdown-box">
            <span style="color:#bfa598; font-size:11px;">Time remaining</span>
            <div class="timer-display" id="clock-display">00:30</div>
        </div>
    </div>

    <div class="color-row">
        <button class="color-btn bg-green" onclick="triggerBetSetup('Green')">Green</button>
        <button class="color-btn bg-violet" onclick="triggerBetSetup('Violet')">Violet</button>
        <button class="color-btn bg-red" onclick="triggerBetSetup('Red')">Red</button>
    </div>

    <div class="numbers-grid">
        <button class="num-ball ball-violet-red" onclick="triggerBetSetup('0')">0</button>
        <button class="num-ball ball-green" onclick="triggerBetSetup('1')">1</button>
        <button class="num-ball ball-red" onclick="triggerBetSetup('2')">2</button>
        <button class="num-ball ball-green" onclick="triggerBetSetup('3')">3</button>
        <button class="num-ball ball-red" onclick="triggerBetSetup('4')">4</button>
        <button class="num-ball ball-violet-green" onclick="triggerBetSetup('5')">5</button>
        <button class="num-ball ball-red" onclick="triggerBetSetup('6')">6</button>
        <button class="num-ball ball-green" onclick="triggerBetSetup('7')">7</button>
        <button class="num-ball ball-red" onclick="triggerBetSetup('8')">8</button>
        <button class="num-ball ball-green" onclick="triggerBetSetup('9')">9</button>
    </div>

    <div class="size-row">
        <button class="size-btn btn-big" onclick="triggerBetSetup('Big')">Big</button>
        <button class="size-btn btn-small" onclick="triggerBetSetup('Small')">Small</button>
    </div>

    <div id="bet-status-label" style="color: #ff8c1a; font-weight: bold; margin: 5px 0;"></div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-game-hist" onclick="toggleInterfaceTab('history')">Game history</div>
        <div class="tab-item" id="tab-chart" onclick="toggleInterfaceTab('chart')">Chart</div>
        <div class="tab-item" id="tab-my-hist" onclick="toggleInterfaceTab('my-history')">My history</div>
    </div>

    <div class="tab-content" id="data-view-container">
        <table id="history-table">
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Number</th>
                    <th>Big Small</th>
                    <th>Color</th>
                </tr>
            </thead>
            <tbody id="history-rows">
                <tr>
                    <td>...51774</td>
                    <td style="color:#f05353; font-weight:bold;">8</td>
                    <td>Big</td>
                    <td><span class="dot ball-red"></span></td>
                </tr>
                <tr>
                    <td>...51773</td>
                    <td style="color:#26a96e; font-weight:bold;">1</td>
                    <td>Small</td>
                    <td><span class="dot ball-green"></span></td>
                </tr>
                <tr>
                    <td>...51772</td>
                    <td style="color:#9253f0; font-weight:bold;">5</td>
                    <td>Big</td>
                    <td><span class="dot ball-violet-green"></span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="gateway-card">
        <h4 style="margin: 0 0 8px 0; color:#ff8c1a;">Instant Gateway & Agent Portal</h4>
        <select id="gateway-provider">
            <option value="Easypaisa">Easypaisa (Zaid Riaz - 03459784947)</option>
            <option value="JazzCash">JazzCash (Mehar Ali - 03454357485)</option>
        </select>
        <input type="number" id="gate-amount" placeholder="Amount (Limit: 300 - 50,000)">
        <input type="text" id="gate-trid" placeholder="Enter 11-Digit Transaction TRID">
        <button style="width:100%; padding:10px; margin-top:5px; background:#26a96e; color:white; border:none; border-radius:5px; font-weight:bold;" onclick="processGatewayAction()">Submit Verification</button>
    </div>

</div>

<script>
    let globalBalance = 5000.00;
    let basePeriodId = 20260613100051;
    let activeIntervalSec = 30;
    let clockTimerCountdown = 30;
    let currentActiveBet = null;
    let activeBetAmount = 0;
    let userBetHistory = [];

    // Live Timing System Matrix
    setInterval(function() {
        if (clockTimerCountdown <= 0) {
            clockTimerCountdown = activeIntervalSec;
            basePeriodId++;
            document.getElementById('display-period').innerText = basePeriodId;
            evaluateSystemCycle();
        } else {
            clockTimerCountdown--;
        }
        
        let mins = Math.floor(clockTimerCountdown / 60);
        let secs = clockTimerCountdown % 60;
        document.getElementById('clock-display').innerText = 
            (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
    }, 1000);

    function switchGameMode(seconds) {
        activeIntervalSec = seconds;
        clockTimerCountdown = seconds;
        
        // Visual Active States Update
        document.querySelectorAll('.mode-item').forEach(btn => btn.classList.remove('active'));
        if(seconds === 30) document.getElementById('mode-30s').classList.add('active');
        if(seconds === 60) document.getElementById('mode-1m').classList.add('active');
        if(seconds === 180) document.getElementById('mode-3m').classList.add('active');
        if(seconds === 300) document.getElementById('mode-5m').classList.add('active');
        
        alert(`Switched to WinGo ${seconds >= 60 ? seconds/60 + ' Min' : seconds + 'sec'} Mode Engine!`);
    }

    function triggerBetSetup(selection) {
        let amountInput = prompt(`Make Selection: ${selection}\nEnter Bet Target Amount (Rs. 5 - 10,000):`, "5");
        if (!amountInput) return;
        let finalAmt = parseInt(amountInput);

        if (isNaN(finalAmt) || finalAmt < 5) {
            alert("Minimum staking capital validation failed (Min: Rs 5).");
            return;
        }
        if (finalAmt > globalBalance) {
            alert("Staking validation refused: Insufficient available liquidity.");
            return;
        }

        currentActiveBet = selection;
        activeBetAmount = finalAmt;
        globalBalance -= finalAmt;
        document.getElementById('main-balance').innerText = globalBalance.toFixed(2);
        document.getElementById('bet-status-label').innerText = `Staked: [${selection}] for Rs. ${activeBetAmount}`;
    }

    function evaluateSystemCycle() {
        let luckyNumber = Math.floor(Math.random() * 10);
        let sizeResult = (luckyNumber >= 5) ? 'Big' : 'Small';
        let colorResult = 'Green';
        if ([2,4,6,8].includes(luckyNumber)) colorResult = 'Red';
        if ([0,5].includes(luckyNumber)) colorResult = 'Violet';

        // Staking Payout Distributions Logic
        if (currentActiveBet !== null) {
            let userWon = false;
            if (currentActiveBet === String(luckyNumber) || currentActiveBet === sizeResult || currentActiveBet === colorResult) {
                let multiple = (isNaN(currentActiveBet)) ? 1.9 : 8.5;
                let calculation = activeBetAmount * multiple;
                globalBalance += calculation;
                userWon = true;
                alert(`🎉 Period Result Victory! You cleared Rs. ${calculation.toFixed(2)}`);
            }
            
            userBetHistory.unshift({
                period: "..." + String(basePeriodId - 1).slice(-5),
                pick: currentActiveBet,
                status: userWon ? `Win +${(activeBetAmount*1.9).toFixed(0)}` : 'Lose',
                color: userWon ? '#26a96e' : '#f05353'
            });
        }

        // Realtime Append to Game History
        let rowBox = document.getElementById('history-rows');
        let mappedColorClass = (colorResult === 'Red') ? 'ball-red' : (colorResult === 'Green' ? 'ball-green' : 'ball-violet-green');
        let newRow = `<tr>
            <td>...${String(basePeriodId - 1).slice(-5)}</td>
            <td style="font-weight:bold; color:${colorResult==='Red'?'#f05353':'#26a96e'}">${luckyNumber}</td>
            <td>${sizeResult}</td>
            <td><span class="dot ${mappedColorClass}"></span></td>
        </tr>`;
        rowBox.innerHTML = newRow + rowBox.innerHTML;

        // Reset variables
        currentActiveBet = null;
        activeBetAmount = 0;
        document.getElementById('main-balance').innerText = globalBalance.toFixed(2);
        document.getElementById('bet-status-label').innerText = "";
    }

    function toggleInterfaceTab(tabName) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        let targetBox = document.getElementById('data-view-container');

        if (tabName === 'history') {
            document.getElementById('tab-game-hist').classList.add('active');
            targetBox.innerHTML = `<table>
                <thead><tr><th>Period</th><th>Number</th><th>Big Small</th><th>Color</th></tr></thead>
                <tbody id="history-rows">${document.getElementById('history-rows').innerHTML}</tbody>
            </table>`;
        } 
        else if (tabName === 'chart') {
            document.getElementById('tab-chart').classList.add('active');
            targetBox.innerHTML = `<div style="padding:15px; text-align:left; font-size:12px; line-height:1.8; color:#bfa598;">
                📊 <b>Live Trend Charts (Last 5 Cycles):</b><br>
                • Period ..51774: <span style="color:#f05353">● Red [8]</span> -> Big<br>
                • Period ..51773: <span style="color:#26a96e">● Green [1]</span> -> Small<br>
                • Period ..51772: <span style="color:#9253f0">● Violet [5]</span> -> Big
            </div>`;
        } 
        else if (tabName === 'my-history') {
            document.getElementById('tab-my-hist').classList.add('active');
            if(userBetHistory.length === 0) {
                targetBox.innerHTML = `<div style="color:#bfa598; padding:30px;">No personalized stakings registered in this current active browser execution.</div>`;
            } else {
                let htmlOut = `<table><thead><tr><th>Period</th><th>Selection</th><th>Outcome</th></tr></thead><tbody>`;
                userBetHistory.forEach(h => {
                    htmlOut += `<tr><td>${h.period}</td><td>${h.pick}</td><td style="color:${h.color}; font-weight:bold;">${h.status}</td></tr>`;
                });
                htmlOut += `</tbody></table>`;
                targetBox.innerHTML = htmlOut;
            }
        }
    }

    function processGatewayAction() {
        let amt = parseInt(document.getElementById('gate-amount').value);
        let idVal = document.getElementById('gate-trid').value.trim();
        if(!amt || !idVal) { alert("Please compile transaction value and TRID fields."); return; }

        alert("Securing handshake with verification gateway...");
        setTimeout(() => {
            globalBalance += amt;
            document.getElementById('main-balance').innerText = globalBalance.toFixed(2);
            alert(`✅ Auto Settlement Confirmed!\nRs. ${amt} credited via Secured Vault.\nTRID Ref: ${idVal}`);
        }, 2000);
    }
</script>
</body>
    </html>
